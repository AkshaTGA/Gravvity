name: Sync Fork

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs every 15 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v3
        with:
          ref: main  # Change to your default branch if needed

      - name: Add upstream remote
        run: git remote add upstream https://github.com/connectwithusemail-debug/Gravvity.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream changes
        run: git merge upstream/main --allow-unrelated-histories

      - name: Push changes to fork
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
